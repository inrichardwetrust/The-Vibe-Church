<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VibeIChing 5.8 賽博神秘感占卜器</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;700;900&display=swap" rel="stylesheet">
    <style>
        #matrix {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.2;
            background-color: #000;
        }

        body { 
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #000;
            color: #0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container { 
            background-color: rgba(0, 15, 0, 0.9);
            border: 2px solid #0f0; 
            padding: 25px;
            border-radius: 15px;
            text-align: center; 
            box-shadow: 0 0 40px rgba(0, 255, 0, 0.5); 
            width: 85%;
            max-width: 320px;
            backdrop-filter: blur(10px);
        }

        h2 { 
            font-size: 24px; 
            color: #fff;
            text-shadow: 0 0 15px #0f0;
            margin-bottom: 20px;
            font-weight: 900;
        }

        button { 
            background: transparent; 
            color: #fff;
            border: 2px solid #0f0;
            padding: 15px; 
            font-size: 18px; 
            cursor: pointer; 
            font-weight: 900;
            border-radius: 50px;
            width: 100%;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
            margin-bottom: 20px;
        }

        button:hover { background: #0f0; color: #000; box-shadow: 0 0 30px #0f0; }

        .result-box {
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 10px;
            min-height: 120px;
            border: 1px solid #111;
        }

        .oracle-text { font-size: 24px; color: #fff; text-shadow: 0 0 10px #fff; line-height: 1.8; }
        b { font-size: 30px; color: #0f0; }

        .desc { font-size: 11px; color: #4a4; margin-top: 20px; text-align: left; opacity: 0.7; }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div class="container">
        <h2>VibeIChing 5.8<br>賽博占卜器</h2>
        <button onclick="generate()">提取物理態起卦</button>
        <div id="output" class="result-box">
            <p style="color: #444;">等待觀測...</p>
        </div>
        <div class="desc">數據源: 設備硬體層物理噪音 (CSPRNG)。</div>
    </div>

    <script>
        // 代碼雨效果
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.height = window.innerHeight;
        canvas.width = window.innerWidth;
        const chars = "日月星辰天地𠂤🏹🔥💧🌀";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0";
            ctx.font = fontSize + "px arial";
            drops.forEach((y, i) => {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 35);

        // 起卦邏輯
        function generate() {
            const out = document.getElementById('output');
            out.innerHTML = "<p style='color:#0f0'>觀測中...</p>";
            
            setTimeout(() => {
                const array = new Uint8Array(3);
                window.crypto.getRandomValues(array);
                const x = (array[0] % 8) + 1;
                const y = (array[1] % 8) + 1;
                const z = (array[2] % 6) + 1;
                
                out.innerHTML = `<div class="oracle-text">X：<b>${x}</b><br>Y：<b>${y}</b><br>Z：<b>${z}</b></div>`;
            }, 800);
        }
    </script>
</body>
</html>
