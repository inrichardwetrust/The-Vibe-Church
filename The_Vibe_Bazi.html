    <script>
        // Matrix 動畫代碼
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d', { alpha: false }); 
        const fontSize = 16; 
        const coreWords = "0101XYZ甲乙丙丁戊己庚辛壬癸子丑寅卯辰巳午未申酉戌亥".split('');
        let columns, drops, headChars;
        
        // 永遠保持運行，不再設為 false
        let isMatrixRunning = true;

        function resizeCanvas() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            columns = Math.floor(canvas.width / fontSize) + 1;
            drops = Array(columns).fill(1); headChars = Array(columns).fill(''); 
            for(let i=0; i<drops.length; i++) drops[i] = Math.floor(Math.random() * -100);
        }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        function draw() {
            if (!isMatrixRunning) return;
            ctx.fillStyle = "rgba(0, 0, 0, 0.08)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = fontSize + "px monospace";
            for(let i = 0; i < drops.length; i++) {
                if(drops[i] < 0) { drops[i]++; continue; }
                if (headChars[i] !== '') {
                    ctx.fillStyle = "#00ff41"; ctx.fillText(headChars[i], i * fontSize, (drops[i] - 1) * fontSize);
                }
                const headText = coreWords[Math.floor(Math.random() * coreWords.length)];
                headChars[i] = headText; ctx.fillStyle = "#ffffff";
                ctx.fillText(headText, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) { drops[i] = 0; headChars[i] = ''; }
                drops[i]++;
            }
        }
        setInterval(draw, 50);

        // 全局計數器
        const namespace = 'ricschild_vibe_theology';
        const key = 'bazi_compiler_clicks';
        async function fetchGlobalCount() {
            try {
                let res = await fetch(`https://api.counterapi.dev/v1/${namespace}/${key}`);
                let data = await res.json();
                document.getElementById('global-counter').innerText = data.count || 0;
            } catch(e) { document.getElementById('global-counter').innerText = "Offline"; }
        }
        fetchGlobalCount();

        // 核心跳轉與拷貝邏輯 (跳轉 AI)
        function copyAndJump(btnElement, url) {
            if(window.currentPayload) {
                const tempTextArea = document.createElement("textarea");
                tempTextArea.value = window.currentPayload;
                document.body.appendChild(tempTextArea);
                tempTextArea.select();
                try {
                    document.execCommand('copy');
                    const oldText = btnElement.innerText;
                    btnElement.innerText = "[ 密鑰已複製，正在跳轉... ]";
                    btnElement.style.background = "#ffffff"; btnElement.style.color = "#000";
                    setTimeout(() => {
                        window.open(url, "_blank");
                        btnElement.innerText = oldText; 
                        btnElement.style.background = "#00ff41"; 
                        btnElement.style.color = "#000";
                    }, 500);
                } catch (err) { alert('瀏覽器阻擋了自動複製，請確保您在安全的環境下運行。'); }
                document.body.removeChild(tempTextArea);
            }
        }

        // 僅拷貝代碼邏輯 (不跳轉)
        function copyOnly(btnElement) {
            if(window.currentPayload) {
                const tempTextArea = document.createElement("textarea");
                tempTextArea.value = window.currentPayload;
                document.body.appendChild(tempTextArea);
                tempTextArea.select();
                try {
                    document.execCommand('copy');
                    const oldText = btnElement.innerText;
                    btnElement.innerText = "[ 已複製到剪貼板 ]";
                    btnElement.style.background = "#ffffff";
                    btnElement.style.color = "#000";
                    setTimeout(() => {
                        btnElement.innerText = oldText;
                        btnElement.style.background = "rgba(0, 40, 0, 0.8)";
                        btnElement.style.color = "#00ff41";
                    }, 2000);
                } catch (err) { alert('瀏覽器阻擋了自動複製，請手動框選複製。'); }
                document.body.removeChild(tempTextArea);
            }
        }

        // 純血八字神煞本地算法引擎
        function calculateCoreShenSha(yGan, yZhi, dGan, dZhi, zhis) {
            let s = [];
            let add = (name) => { if (!s.includes(name)) s.push(name); };
            
            // 華蓋、驛馬、桃花判定字典
            let huagaiMap = {'亥':'未','卯':'未','未':'未', '寅':'戌','午':'戌','戌':'戌', '巳':'丑','酉':'丑','丑':'丑', '申':'辰','子':'辰','辰':'辰'};
            let yimaMap = {'亥':'巳','卯':'巳','未':'巳', '寅':'申','午':'申','戌':'申', '巳':'亥','酉':'亥','丑':'亥', '申':'寅','子':'寅','辰':'寅'};
            let taohuaMap = {'亥':'子','卯':'子','未':'子', '寅':'卯','午':'卯','戌':'卯', '巳':'午','酉':'午','丑':'午', '申':'酉','子':'酉','辰':'酉'};
            
            // 祿神、羊刃判定字典 (以日干為主)
            let luMap = {'甲':'寅','乙':'卯','丙':'巳','戊':'巳','丁':'午','己':'午','庚':'申','辛':'酉','壬':'亥','癸':'子'};
            let renMap = {'甲':'卯','乙':'辰','丙':'午','戊':'午','丁':'未','己':'未','庚':'酉','辛':'戌','壬':'子','癸':'丑'};

            // 天乙貴人判定 (以日干/年干為主)
            let tianyi = (gan, z) => {
                if (['甲','戊','庚'].includes(gan) && ['丑','未'].includes(z)) return true;
                if (['乙','己'].includes(gan) && ['子','申'].includes(z)) return true;
                if (['丙','丁'].includes(gan) && ['亥','酉'].includes(z)) return true;
                if (['壬','癸'].includes(gan) && ['卯','巳'].includes(z)) return true;
                if (['辛'].includes(gan) && ['午','寅'].includes(z)) return true;
                return false;
            };

            zhis.forEach(zhi => {
                if (zhi === huagaiMap[yZhi] || zhi === huagaiMap[dZhi]) add('華蓋');
                if (zhi === yimaMap[yZhi] || zhi === yimaMap[dZhi]) add('驛馬');
                if (zhi === taohuaMap[yZhi] || zhi === taohuaMap[dZhi]) add('桃花');
                if (zhi === luMap[dGan]) add('祿神');
                if (zhi === renMap[dGan]) add('羊刃');
                if (tianyi(dGan, zhi) || tianyi(yGan, zhi)) add('天乙貴人');
            });

            // 魁罡 (日柱為主)
            let kuigang = ['戊戌','庚辰','庚戌','壬辰'];
            if (kuigang.includes(dGan + dZhi)) add('魁罡');

            return s.length > 0 ? s.join('、 ') : '無特殊神煞';
        }

        let isCoolingDown = false;

async function executeCompilation() {
            if (isCoolingDown) return;

            const btn = document.getElementById('action-btn');
            const container = document.getElementById('sys-container');
            const out = document.getElementById('output');
            
            const name = document.getElementById('user-name').value.trim() || "Unknown User";
            const genderSelect = document.getElementById('gender');
            const genderStr = genderSelect.options[genderSelect.selectedIndex].text;
            const calType = document.getElementById('calendar-type').value;
            
            const dateStr = document.getElementById('birth-date').value;
            const timeStr = document.getElementById('birth-time').value;
            const locationStr = document.getElementById('location').value.trim();

            if(!dateStr || !timeStr) { alert("ERROR: 降臨日期與時間不能為空。"); return; }
            if (typeof Solar === 'undefined' || typeof Lunar === 'undefined') { alert("SYSTEM ERROR: 曆法庫未加載。"); return; }

            isCoolingDown = true; btn.disabled = true; btn.innerText = "[ 系統冷卻中... 請求地理 API ]";
            fetch(`https://api.counterapi.dev/v1/${namespace}/${key}/up`).then(res => res.json()).then(data => document.getElementById('global-counter').innerText = data.count).catch(e => console.log('Counter API block'));

            out.style.display = 'flex'; container.classList.add('glitch-pixel-active');
            
            // 記錄開始坍縮的時間 (用於強制延遲)
            const startTime = Date.now();

            let scrambleInterval = setInterval(() => {
                const randomHex = coreWords[Math.floor(Math.random() * coreWords.length)];
                out.innerHTML = `<div class="oracle-text" style="color: #fff; text-align:center; text-shadow: 2px 0px red, -2px 0px cyan;">
                    <div style="font-size: 36px; margin-bottom: 10px;">${randomHex}</div>[ 解析中... ]
                </div>`;
            }, 50); 

            try {
                let lon = 120; let locationMsg = "未填寫地點，默認平太陽時 (120°E)"; let isTrueSolar = false;
                if (locationStr) {
                    try {
                        const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(locationStr)}&format=json&limit=1`);
                        const data = await res.json();
                        if (data && data.length > 0) {
                            lon = parseFloat(data[0].lon); locationMsg = `已獲取坐標 (經度: ${lon.toFixed(2)}°E)，真太陽時啟動`; isTrueSolar = true;
                        } else { locationMsg = `⚠️ 無法解析城市，降級為平太陽時 (120°E)`; }
                    } catch(err) { locationMsg = `⚠️ API 請求限制，降級為平太陽時 (120°E)`; }
                }

                let [year, month, day] = dateStr.split('-').map(Number);
                let [hour, minute] = timeStr.split(':').map(Number);
                let dateObj = new Date(year, month - 1, day, hour, minute);

                if (isTrueSolar) {
                    let timeDiff = (lon - 120) * 4; dateObj.setMinutes(dateObj.getMinutes() + timeDiff);
                }

                // 💡 新增：同時保存公曆與農曆的實例，用於後續精確輸出
                let baziObj, solarInst, lunarInst;
                if (calType === 'solar') {
                    solarInst = Solar.fromYmdHms(dateObj.getFullYear(), dateObj.getMonth() + 1, dateObj.getDate(), dateObj.getHours(), dateObj.getMinutes(), 0);
                    lunarInst = solarInst.getLunar();
                    baziObj = lunarInst.getEightChar();
                } else {
                    lunarInst = Lunar.fromYmdHms(dateObj.getFullYear(), dateObj.getMonth() + 1, dateObj.getDate(), dateObj.getHours(), dateObj.getMinutes(), 0);
                    solarInst = lunarInst.getSolar();
                    baziObj = lunarInst.getEightChar();
                }

                // --- 獲取天干地支 ---
                let yPillar = baziObj.getYear(); let mPillar = baziObj.getMonth(); let dPillar = baziObj.getDay(); let tPillar = baziObj.getTime();
                
                // --- 獲取十神 ---
                let yTg = baziObj.getYearShiShenGan() || "比肩";
                let mTg = baziObj.getMonthShiShenGan() || "比肩";
                let tTg = baziObj.getTimeShiShenGan() || "比肩";
                let dZhiTg = baziObj.getDayShiShenZhi()[0] || "比肩"; 

                // --- 純血神煞本地運算 ---
                let yGan = baziObj.getYearGan(); let yZhi = baziObj.getYearZhi();
                let mZhi = baziObj.getMonthZhi();
                let dGan = baziObj.getDayGan(); let dZhi = baziObj.getDayZhi();
                let tZhi = baziObj.getTimeZhi();
                let allZhis = [yZhi, mZhi, dZhi, tZhi];
                let uniqueShenSha = calculateCoreShenSha(yGan, yZhi, dGan, dZhi, allZhis);

                // --- 裝填終極 Payload ---
                const systemPrompt = document.getElementById('vibe-prompt').textContent.trim() + "\n\n";
                let packetStr = systemPrompt;
                packetStr += `=== 【玩家參數與環境日誌】 ===\n`;
                packetStr += `代號：${name}\n`;
                packetStr += `性別：${genderStr}\n`;
                packetStr += `輸入基準：${calType === 'solar' ? '公曆 (Solar)' : '農曆 (Lunar)'}\n`;
                // 💡 新增：精確注入公曆與農曆的年月日時刻
                packetStr += `公曆座標：${solarInst.getYear()}年${solarInst.getMonth()}月${solarInst.getDay()}日 ${timeStr}\n`;
                packetStr += `農曆座標：${lunarInst.getYear()}年${lunarInst.getMonthInChinese()}月${lunarInst.getDayInChinese()} ${timeStr}\n`;
                packetStr += `網絡節點：${locationStr || '未提供'} [${locationMsg}]\n`;
                packetStr += `=========================\n`;
                packetStr += `=== 【物理實例化源代碼】(絕對真值，嚴禁篡改) ===\n`;
                packetStr += `【年柱】：${yPillar} (驅動模塊：${yTg})\n`;
                packetStr += `【月柱】：${mPillar} (驅動模塊：${mTg})\n`;
                packetStr += `【日柱】：${dPillar} [核心 CPU] (內核驅動：${dZhiTg})\n`;
                packetStr += `【時柱】：${tPillar} (驅動模塊：${tTg})\n\n`;
                packetStr += `【神煞陣列 (隱藏 Buff/Bug)】：\n[ ${uniqueShenSha} ]\n`;
                packetStr += `=========================\n`;
                packetStr += `請讀取上方代碼，生成 Mimir 的命運審計報告。`;
                
                window.currentPayload = packetStr;

                // 強制延遲邏輯 (至少 1.5 秒的儀式感)
                const elapsedTime = Date.now() - startTime;
                const minimumWaitTime = 1500; 
                if (elapsedTime < minimumWaitTime) {
                    await new Promise(resolve => setTimeout(resolve, minimumWaitTime - elapsedTime));
                }

                // --- 渲染前端 UI ---
                clearInterval(scrambleInterval); container.classList.remove('glitch-pixel-active'); 

                out.innerHTML = `
                <div class="oracle-text">
                    <div class="log-line">[ ${locationMsg} ]</div>
                    <div class="bazi-grid">
                        <div class="pillar"><div>時</div><div class="stem-branch">${tPillar}</div><div class="shishen-tag">${tTg}</div></div>
                        <div class="pillar"><div>日</div><div class="stem-branch" style="color:#FFD700; border-color:#FFD700;">${dPillar}</div><div class="shishen-tag" style="color:#FFD700;">[日主]</div></div>
                        <div class="pillar"><div>月</div><div class="stem-branch">${mPillar}</div><div class="shishen-tag">${mTg}</div></div>
                        <div class="pillar"><div>年</div><div class="stem-branch">${yPillar}</div><div class="shishen-tag">${yTg}</div></div>
                    </div>
                    
                    <div style="font-size: 13px; color: #aaffaa; text-align: center; margin-bottom: 15px; font-family: monospace; border-top: 1px dashed #005511; padding-top: 10px;">
                        [ 隱藏權限掃描 ]: <span style="color:#fff; font-weight:bold;">${uniqueShenSha}</span>
                    </div>

                    <div style="font-size: 12px; color: #00ff41; margin-bottom: 10px; text-align: center;">[ 選擇節點並注入代碼 ]</div>
                    
                    <div class="btn-group">
                        <button type="button" class="copy-btn ai-btn" onclick="copyAndJump(this, 'https://gemini.google.com/')">🚀 注入 Gemini</button>
                        <button type="button" class="copy-btn ai-btn" onclick="copyAndJump(this, 'https://chatgpt.com/')">🚀 注入 ChatGPT</button>
                        <button type="button" class="copy-btn" onclick="copyOnly(this)">📋 僅複製源代碼</button>
                    </div>
                </div>`;

            } catch (err) {
                clearInterval(scrambleInterval); container.classList.remove('glitch-pixel-active'); 
                out.innerHTML = `<div style="color:red; font-family:monospace; text-align:center;">SYSTEM ERROR: ${err.message}</div>`;
            } finally {
                setTimeout(() => { isCoolingDown = false; btn.innerText = "重新編譯 (Re-Generate)"; btn.disabled = false; }, 3000);
            }
        }
    </script>
