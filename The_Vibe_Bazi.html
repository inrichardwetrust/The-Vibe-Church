<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Vibe 8.0 | Source Code Compiler</title>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Noto Serif TC', serif; background-color: #000; color: #00ff41;
            display: flex; flex-direction: column; min-height: 100vh; margin: 0;
            padding: 30px 15px; box-sizing: border-box; overflow-x: hidden; overflow-y: auto;   
        }

        #matrix { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; transform: translateZ(0); }

        .container { 
            position: relative; z-index: 10; background-color: rgba(0, 15, 0, 0.95); 
            border: 1px solid #00ff41; padding: 25px; border-radius: 4px; text-align: center; 
            box-shadow: inset 0 0 20px rgba(0, 255, 65, 0.1); width: 100%; max-width: 550px; 
            margin: auto; display: block; box-sizing: border-box;
        }

        .glitch-pixel-active { animation: container-jitter 0.2s steps(5) infinite; }
        .glitch-pixel-active::after {
            content: ''; position: absolute; left: -5%; width: 110%;
            background: rgba(0, 255, 65, 0.15); backdrop-filter: invert(100%) contrast(150%) hue-rotate(90deg); 
            z-index: 999; pointer-events: none; animation: pixel-tear 0.25s steps(6) infinite;
        }

        @keyframes container-jitter {
            0% { transform: translate(0, 0); } 20% { transform: translate(-3px, 1px); }
            40% { transform: translate(4px, -2px); } 60% { transform: translate(-2px, -1px); }
            80% { transform: translate(3px, 2px); } 100% { transform: translate(0, 0); }
        }

        @keyframes pixel-tear {
            0% { top: 10%; height: 15px; transform: translateX(10px); } 20% { top: 40%; height: 40px; transform: translateX(-15px); }
            40% { top: 75%; height: 10px; transform: translateX(20px); } 60% { top: 25%; height: 50px; transform: translateX(-10px); }
            80% { top: 85%; height: 12px; transform: translateX(15px); } 100% { top: 50%; height: 25px; transform: translateX(-20px); }
        }

        h2 { font-size: 26px; color: #e0ffe0; text-shadow: 0 0 10px #00ff41; margin-bottom: 5px; font-weight: 900; letter-spacing: 2px;}
        .subtitle { font-size: 13px; color: #aaffaa; margin-bottom: 25px; letter-spacing: 1px; font-family: monospace; }

        .field-group { display: flex; flex-direction: column; text-align: left; margin-bottom: 15px; }
        .field-label { font-size: 14px; font-weight: bold; color: #00ff41; margin-bottom: 5px; }
        .field-hint { font-size: 11px; color: #1a7a2e; margin-top: 4px; font-family: monospace; }
        
        .vibe-input {
            background: rgba(0, 20, 0, 0.8); border: 1px solid #005511; color: #00ff41;
            padding: 12px; font-family: monospace; font-size: 16px; border-radius: 2px;
            transition: all 0.3s ease; box-sizing: border-box; width: 100%;
        }
        .vibe-input:focus { outline: none; border-color: #00ff41; box-shadow: 0 0 10px rgba(0, 255, 65, 0.3); background: rgba(0, 40, 0, 0.9); }
        .vibe-input::placeholder { color: #005511; font-size: 14px; }
        select.vibe-input { cursor: pointer; appearance: none; -webkit-appearance: none; background-image: url('data:image/svg+xml;utf8,<svg fill="%2300ff41" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>'); background-repeat: no-repeat; background-position: right 10px center; background-size: 20px; }

        .flex-row { display: flex; gap: 10px; }
        .flex-row .field-group { flex: 1; }

        .main-btn { 
            font-family: monospace; background: rgba(0, 40, 0, 0.8); color: #00ff41;
            border: 1px solid #00ff41; padding: 15px; font-size: 15px; cursor: pointer; 
            font-weight: 700; letter-spacing: 1px; width: 100%; transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2); margin-top: 10px; margin-bottom: 15px; box-sizing: border-box;
        }
        .main-btn:hover:not(:disabled) { background: #00ff41; color: #000; box-shadow: 0 0 30px #00ff41; }
        .main-btn:disabled { background: #1a5223; color: #00ff41; border-color: #1a5223; box-shadow: none; cursor: not-allowed; opacity: 0.8; }

        .result-box {
            background: rgba(0, 5, 0, 0.95); padding: 15px; min-height: 80px;
            border: 1px solid #004411; display: flex; flex-direction: column;
            align-items: center; justify-content: center; position: relative; text-align: left; 
            margin-bottom: 15px; box-sizing: border-box;
        }

        .oracle-text { width: 100%; }

        .bazi-grid { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; width: 100%; }
        .pillar {
            background: rgba(0, 30, 0, 0.7); border: 1px dashed #00ff41; padding: 10px;
            text-align: center; width: 22%; box-shadow: inset 0 0 10px rgba(0, 255, 65, 0.1);
        }
        .pillar div:first-child { font-size: 12px; color: #aaffaa; border-bottom: 1px solid #005511; padding-bottom: 5px; margin-bottom: 8px; font-family: monospace; }
        .stem-branch { 
            font-size: 26px; font-weight: 900; color: #ffffff; text-shadow: 0 0 10px #00ff41; 
            writing-mode: vertical-lr; text-orientation: upright; letter-spacing: 6px; 
            height: 70px; margin: 0 auto; display: flex; align-items: center; justify-content: center;
        }
        
        .shishen-tag { font-size: 10px; color: #00ff41; font-family: monospace; margin-top: 5px; background: rgba(0,50,0,0.5); padding: 2px; border-radius: 2px;}

        .log-line { font-size: 12px; color: #88cc88; font-family: monospace; text-align: center; border-bottom: 1px dashed rgba(0, 255, 65, 0.3); padding-bottom: 10px; margin-bottom: 10px; }
        
        .btn-group { display: flex; gap: 10px; width: 100%; flex-direction: column; }
        .copy-btn {
            flex: 1; background: rgba(0, 40, 0, 0.8); color: #00ff41; border: 1px solid #00ff41;
            padding: 14px 10px; font-family: monospace; font-size: 14px; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.2); transition: all 0.2s; box-sizing: border-box; width: 100%; text-align: center; text-decoration: none;
        }
        .copy-btn:hover { background: #00ff41; color: #000; box-shadow: 0 0 15px #00ff41; }
        .copy-btn.ai-btn { background: #00ff41; color: #000; }
        .copy-btn.ai-btn:hover { background: #ffffff; border-color: #ffffff; box-shadow: 0 0 20px #ffffff; }

        .counter-box { font-size: 11px; color: #1a5223; text-align: center; font-family: monospace; margin-top: 15px; border-top: 1px dashed #003300; padding-top: 10px;}
        .counter-box span { color: #00ff41; font-weight: bold; }
        
        @media (min-width: 481px) { .btn-group { flex-direction: row; flex-wrap: wrap; } .btn-group .copy-btn { flex: 1 1 calc(33% - 10px); } }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>

    <div class="container" id="sys-container">
        <h2>The Vibe</h2>
        <div class="subtitle">[ 天機庫 API 授權網關 ]</div>

        <div class="flex-row">
            <div class="field-group">
                <label class="field-label">■ 玩家代號 (姓名/暱稱)</label>
                <div class="field-hint">Your Identity / Name</div>
                <input type="text" id="user-name" class="vibe-input" placeholder="例: Richard" autocomplete="off">
            </div>
            <div class="field-group">
                <label class="field-label">■ 硬件規格 (性別)</label>
                <div class="field-hint">Hardware / Gender</div>
                <select id="gender" class="vibe-input">
                    <option value="1">乾造 (Male)</option>
                    <option value="0">坤造 (Female)</option>
                </select>
            </div>
        </div>

        <div class="field-group">
            <label class="field-label">■ 曆法協議 (公曆/農曆)</label>
            <div class="field-hint">Calendar Protocol</div>
            <select id="calendar-type" class="vibe-input">
                <option value="solar">公曆 (Gregorian Calendar)</option>
                <option value="lunar">農曆 (Lunar Calendar)</option>
            </select>
        </div>

        <div class="flex-row">
            <div class="field-group">
                <label class="field-label">■ 降臨日期 (Birthday)</label>
                <input type="date" id="birth-date" class="vibe-input" required>
            </div>
            <div class="field-group">
                <label class="field-label">■ 降臨時刻 (Time)</label>
                <input type="time" id="birth-time" class="vibe-input" required>
            </div>
        </div>

        <div class="field-group">
            <label class="field-label">■ 物理登錄點 (出生城市)</label>
            <div class="field-hint">Location (用於計算真太陽時，例: Stockholm / 河南南阳)</div>
            <input type="text" id="location" class="vibe-input" placeholder="City Name">
        </div>

        <button type="button" id="action-btn" class="main-btn" onclick="executeCompilation()">獲取密鑰 (Generate Key)</button>
        
        <div id="output" class="result-box" style="display: none;"></div>
        
        <div class="counter-box">
            GLOBAL AKASHIC SYNCS: <span id="global-counter">--</span>
        </div>
    </div>

    <script>
        // Matrix 動畫代碼
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d', { alpha: false }); 
        const fontSize = 16; 
        const coreWords = "0101XYZ甲乙丙丁戊己庚辛壬癸子丑寅卯辰巳午未申酉戌亥".split('');
        let columns, drops, headChars;
        
        let isMatrixRunning = true;

        function resizeCanvas() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            columns = Math.floor(canvas.width / fontSize) + 1;
            drops = Array(columns).fill(1); headChars = Array(columns).fill(''); 
            for(let i=0; i<drops.length; i++) drops[i] = Math.floor(Math.random() * -100);
        }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        function draw() {
            if (!isMatrixRunning) return;
            ctx.fillStyle = "rgba(0, 0, 0, 0.08)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = fontSize + "px monospace";
            for(let i = 0; i < drops.length; i++) {
                if(drops[i] < 0) { drops[i]++; continue; }
                if (headChars[i] !== '') {
                    ctx.fillStyle = "#00ff41"; ctx.fillText(headChars[i], i * fontSize, (drops[i] - 1) * fontSize);
                }
                const headText = coreWords[Math.floor(Math.random() * coreWords.length)];
                headChars[i] = headText; ctx.fillStyle = "#ffffff";
                ctx.fillText(headText, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) { drops[i] = 0; headChars[i] = ''; }
                drops[i]++;
            }
        }
        setInterval(draw, 50);

        // 全局計數器
        const namespace = 'ricschild_vibe_theology';
        const key = 'bazi_compiler_clicks';
        async function fetchGlobalCount() {
            try {
                let res = await fetch(`https://api.counterapi.dev/v1/${namespace}/${key}`);
                let data = await res.json();
                document.getElementById('global-counter').innerText = data.count || 0;
            } catch(e) { document.getElementById('global-counter').innerText = "Offline"; }
        }
        fetchGlobalCount();

        function copyAndJump(btnElement, url) {
            if(window.currentPayload) {
                const tempTextArea = document.createElement("textarea");
                tempTextArea.value = window.currentPayload;
                document.body.appendChild(tempTextArea);
                tempTextArea.select();
                try {
                    document.execCommand('copy');
                    const oldText = btnElement.innerText;
                    btnElement.innerText = "[ 密鑰已複製，正在跳轉... ]";
                    btnElement.style.background = "#ffffff"; btnElement.style.color = "#000";
                    setTimeout(() => {
                        window.open(url, "_blank");
                        btnElement.innerText = oldText; 
                        btnElement.style.background = "#00ff41"; 
                        btnElement.style.color = "#000";
                    }, 500);
                } catch (err) { alert('瀏覽器阻擋了自動複製，請確保您在安全的環境下運行。'); }
                document.body.removeChild(tempTextArea);
            }
        }

        function copyOnly(btnElement) {
            if(window.currentPayload) {
                const tempTextArea = document.createElement("textarea");
                tempTextArea.value = window.currentPayload;
                document.body.appendChild(tempTextArea);
                tempTextArea.select();
                try {
                    document.execCommand('copy');
                    const oldText = btnElement.innerText;
                    btnElement.innerText = "[ 已複製到剪貼板 ]";
                    btnElement.style.background = "#ffffff";
                    btnElement.style.color = "#000";
                    setTimeout(() => {
                        btnElement.innerText = oldText;
                        btnElement.style.background = "rgba(0, 40, 0, 0.8)";
                        btnElement.style.color = "#00ff41";
                    }, 2000);
                } catch (err) { alert('瀏覽器阻擋了自動複製，請手動框選複製。'); }
                document.body.removeChild(tempTextArea);
            }
        }

        function calculateCoreShenSha(yGan, yZhi, dGan, dZhi, zhis) {
            let s = [];
            let add = (name) => { if (!s.includes(name)) s.push(name); };
            
            let huagaiMap = {'亥':'未','卯':'未','未':'未', '寅':'戌','午':'戌','戌':'戌', '巳':'丑','酉':'丑','丑':'丑', '申':'辰','子':'辰','辰':'辰'};
            let yimaMap = {'亥':'巳','卯':'巳','未':'巳', '寅':'申','午':'申','戌':'申', '巳':'亥','酉':'亥','丑':'亥', '申':'寅','子':'寅','辰':'寅'};
            let taohuaMap = {'亥':'子','卯':'子','未':'子', '寅':'卯','午':'卯','戌':'卯', '巳':'午','酉':'午','丑':'午', '申':'酉','子':'酉','辰':'酉'};
            
            let luMap = {'甲':'寅','乙':'卯','丙':'巳','戊':'巳','丁':'午','己':'午','庚':'申','辛':'酉','壬':'亥','癸':'子'};
            let renMap = {'甲':'卯','乙':'辰','丙':'午','戊':'午','丁':'未','己':'未','庚':'酉','辛':'戌','壬':'子','癸':'丑'};

            let tianyi = (gan, z) => {
                if (['甲','戊','庚'].includes(gan) && ['丑','未'].includes(z)) return true;
                if (['乙','己'].includes(gan) && ['子','申'].includes(z)) return true;
                if (['丙','丁'].includes(gan) && ['亥','酉'].includes(z)) return true;
                if (['壬','癸'].includes(gan) && ['卯','巳'].includes(z)) return true;
                if (['辛'].includes(gan) && ['午','寅'].includes(z)) return true;
                return false;
            };

            zhis.forEach(zhi => {
                if (zhi === huagaiMap[yZhi] || zhi === huagaiMap[dZhi]) add('華蓋');
                if (zhi === yimaMap[yZhi] || zhi === yimaMap[dZhi]) add('驛馬');
                if (zhi === taohuaMap[yZhi] || zhi === taohuaMap[dZhi]) add('桃花');
                if (zhi === luMap[dGan]) add('祿神');
                if (zhi === renMap[dGan]) add('羊刃');
                if (tianyi(dGan, zhi) || tianyi(yGan, zhi)) add('天乙貴人');
            });

            let kuigang = ['戊戌','庚辰','庚戌','壬辰'];
            if (kuigang.includes(dGan + dZhi)) add('魁罡');

            return s.length > 0 ? s.join('、 ') : '無特殊神煞';
        }

        let isCoolingDown = false;

        async function executeCompilation() {
            if (isCoolingDown) return;

            const btn = document.getElementById('action-btn');
            const container = document.getElementById('sys-container');
            const out = document.getElementById('output');
            
            const name = document.getElementById('user-name').value.trim() || "Unknown User";
            const genderSelect = document.getElementById('gender');
            const genderStr = genderSelect.options[genderSelect.selectedIndex].text;
            const calType = document.getElementById('calendar-type').value;
            
            const dateStr = document.getElementById('birth-date').value;
            const timeStr = document.getElementById('birth-time').value;
            const locationStr = document.getElementById('location').value.trim();

            if(!dateStr || !timeStr) { alert("ERROR: 降臨日期與時間不能為空。"); return; }
            if (typeof Solar === 'undefined' || typeof Lunar === 'undefined') { alert("SYSTEM ERROR: 曆法庫未加載。"); return; }

            isCoolingDown = true; btn.disabled = true; btn.innerText = "[ 系統冷卻中... 同步雲端協議 ]";
            fetch(`https://api.counterapi.dev/v1/${namespace}/${key}/up`).then(res => res.json()).then(data => document.getElementById('global-counter').innerText = data.count).catch(e => console.log('Counter API block'));

            out.style.display = 'flex'; container.classList.add('glitch-pixel-active');
            
            const startTime = Date.now();
            let scrambleInterval = setInterval(() => {
                const randomHex = coreWords[Math.floor(Math.random() * coreWords.length)];
                out.innerHTML = `<div class="oracle-text" style="color: #fff; text-align:center; text-shadow: 2px 0px red, -2px 0px cyan;">
                    <div style="font-size: 36px; margin-bottom: 10px;">${randomHex}</div>[ 雲端協議與地理節點解析中... ]
                </div>`;
            }, 50); 

            try {
                // ============================================
                // 1. 動態加載 GitHub 云端 Prompt 提示词
                // ============================================
                let systemPrompt = "";
                try {
                    const promptRes = await fetch('https://inrichardwetrust.github.io/The-Vibe-Church/assets/vibe_prompt_bazi.json', { cache: 'no-cache' });
                    if (!promptRes.ok) throw new Error(`HTTP Error ${promptRes.status}`);
                    let rawText = await promptRes.text();
                    try {
                        let jsonObj = JSON.parse(rawText);
                        systemPrompt = jsonObj.prompt || jsonObj.system_prompt || jsonObj.systemPrompt || rawText;
                    } catch (parseErr) {
                        systemPrompt = rawText;
                    }
                } catch(err) {
                    throw new Error(`獲取 GitHub 雲端提示詞失敗: ${err.message}`);
                }

                // ============================================
                // 2. 基准历法实例（显示用，锁死用户输入）
                // ============================================
                let [year, month, day] = dateStr.split('-').map(Number);
                let [hour, minute] = timeStr.split(':').map(Number);

                let baseSolar, baseLunar;
                if (calType === 'solar') {
                    baseSolar = Solar.fromYmdHms(year, month, day, hour, minute, 0);
                    baseLunar = baseSolar.getLunar();
                } else {
                    baseLunar = Lunar.fromYmdHms(year, month, day, hour, minute, 0);
                    baseSolar = baseLunar.getSolar();
                }

                // ============================================
                // 3. 地理与真太阳时计算（多語言穿透升級版）
                // ============================================
                let isTrueSolar = false;
                let locationMsg = "未填寫地點，默認平太陽時 (120°E)";
                let calcDateObj = new Date(baseSolar.getYear(), baseSolar.getMonth() - 1, baseSolar.getDay(), hour, minute);

                if (locationStr) {
                    try {
                        // 💡 升級：加入 &namedetails=1，讓 API 返回該節點的所有多語言別名
                        const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(locationStr)}&format=json&limit=1&namedetails=1&accept-language=zh,en`);
                        const data = await res.json();
                        
                        if (data && data.length > 0) {
                            let locLower = locationStr.toLowerCase();
                            let display = (data[0].display_name || "").toLowerCase();
                            let nativeName = (data[0].name || "").toLowerCase();
                            
                            // 💡 【多維度鎖死機制】：檢查 (1) 顯示全稱 (2) 當地原名 (3) 所有已知語言的翻譯字典
                            let isValidMatch = display.includes(locLower) || nativeName.includes(locLower);
                            
                            // 如果前兩者沒命中，遍歷該節點的所有多語言字典進行精確核對
                            if (!isValidMatch && data[0].namedetails) {
                                for (let key in data[0].namedetails) {
                                    if (data[0].namedetails[key].toLowerCase().includes(locLower)) {
                                        isValidMatch = true;
                                        break;
                                    }
                                }
                            }
                            
                            if (isValidMatch) {
                                let lon = parseFloat(data[0].lon);
                                let refLon = Math.round(lon / 15) * 15;
                                if (lon >= 73 && lon <= 135) { refLon = 120; }
                                
                                let timeDiff = (lon - refLon) * 4; 
                                calcDateObj.setMinutes(calcDateObj.getMinutes() + timeDiff);
                                
                                locationMsg = `鎖定坐標 (${lon.toFixed(2)}°E) | 底層八字套用太陽時差 ${timeDiff > 0 ? '+' : ''}${timeDiff.toFixed(0)} 分鐘`; 
                                isTrueSolar = true;
                            } else {
                                // 模糊匹配徹底失敗，拒絕瞎編
                                locationMsg = `⚠️ 物理節點無效，拒絕模糊匹配，降級為平太陽時`;
                            }
                        } else { 
                            locationMsg = `⚠️ 查無此節點 (${locationStr})，降級為平太陽時`; 
                        }
                    } catch(err) { 
                        locationMsg = `⚠️ 節點庫響應超時，降級為平太陽時`; 
                    }
                }

                // 起出真实的八字
                let calcSolar = Solar.fromYmdHms(calcDateObj.getFullYear(), calcDateObj.getMonth() + 1, calcDateObj.getDate(), calcDateObj.getHours(), calcDateObj.getMinutes(), 0);
                let calcLunar = calcSolar.getLunar();
                let baziObj = calcLunar.getEightChar();

                let yPillar = baziObj.getYear(); let mPillar = baziObj.getMonth(); let dPillar = baziObj.getDay(); let tPillar = baziObj.getTime();
                let yTg = baziObj.getYearShiShenGan() || "比肩"; let mTg = baziObj.getMonthShiShenGan() || "比肩";
                let tTg = baziObj.getTimeShiShenGan() || "比肩"; let dZhiTg = baziObj.getDayShiShenZhi()[0] || "比肩"; 

                let yGan = baziObj.getYearGan(); let yZhi = baziObj.getYearZhi();
                let mZhi = baziObj.getMonthZhi(); let dGan = baziObj.getDayGan(); let dZhi = baziObj.getDayZhi();
                let tZhi = baziObj.getTimeZhi(); let allZhis = [yZhi, mZhi, dZhi, tZhi];
                let uniqueShenSha = calculateCoreShenSha(yGan, yZhi, dGan, dZhi, allZhis);

                // ============================================
                // 4. 裝填終極 Payload
                // ============================================
                let packetStr = systemPrompt.trim() + "\n\n";
                packetStr += `=== 【玩家參數與環境日誌】 ===\n`;
                packetStr += `代號：${name}\n`;
                packetStr += `性別：${genderStr}\n`;
                packetStr += `輸入基準：${calType === 'solar' ? '公曆 (Solar)' : '農曆 (Lunar)'}\n`;
                packetStr += `公曆座標：${baseSolar.getYear()}年${baseSolar.getMonth()}月${baseSolar.getDay()}日 ${timeStr}\n`;
                packetStr += `農曆座標：${baseLunar.getYear()}年${baseLunar.getMonthInChinese()}月${baseLunar.getDayInChinese()} ${timeStr}\n`;
                packetStr += `網絡節點：${locationStr || '未提供'} [${locationMsg}]\n`;
                packetStr += `=========================\n`;
                packetStr += `=== 【物理實例化源代碼】(絕對真值，嚴禁篡改) ===\n`;
                packetStr += `【年柱】：${yPillar} (出廠配置：${yTg})\n`;
                packetStr += `【月柱】：${mPillar} (運作環境：${mTg})\n`;
                packetStr += `【日柱】：${dPillar} [核心 CPU] (玩家核心：${dZhiTg})\n`;
                packetStr += `【時柱】：${tPillar} (終局結算：${tTg})\n\n`;
                packetStr += `【神煞陣列 (隱藏 Buff/Bug)】：\n[ ${uniqueShenSha} ]\n`;
                packetStr += `=========================\n`;
                packetStr += `請讀取上方代碼，生成 Mimir 的命運審計報告。`;
                
                window.currentPayload = packetStr;

                const elapsedTime = Date.now() - startTime;
                const minimumWaitTime = 1500; 
                if (elapsedTime < minimumWaitTime) {
                    await new Promise(resolve => setTimeout(resolve, minimumWaitTime - elapsedTime));
                }

                clearInterval(scrambleInterval); container.classList.remove('glitch-pixel-active'); 

                out.innerHTML = `
                <div class="oracle-text">
                    <div class="log-line">[ ${locationMsg} ]</div>
                    <div class="bazi-grid">
                        <div class="pillar"><div>時</div><div class="stem-branch">${tPillar}</div><div class="shishen-tag">${tTg}</div></div>
                        <div class="pillar"><div>日</div><div class="stem-branch" style="color:#FFD700; border-color:#FFD700;">${dPillar}</div><div class="shishen-tag" style="color:#FFD700;">[日主]</div></div>
                        <div class="pillar"><div>月</div><div class="stem-branch">${mPillar}</div><div class="shishen-tag">${mTg}</div></div>
                        <div class="pillar"><div>年</div><div class="stem-branch">${yPillar}</div><div class="shishen-tag">${yTg}</div></div>
                    </div>
                    
                    <div style="font-size: 13px; color: #aaffaa; text-align: center; margin-bottom: 15px; font-family: monospace; border-top: 1px dashed #005511; padding-top: 10px;">
                        [ 隱藏權限掃描 ]: <span style="color:#fff; font-weight:bold;">${uniqueShenSha}</span>
                    </div>

                    <div style="font-size: 12px; color: #00ff41; margin-bottom: 10px; text-align: center;">[ 選擇節點並注入代碼 ]</div>
                    
                    <div class="btn-group">
                        <button type="button" class="copy-btn ai-btn" onclick="copyAndJump(this, 'https://gemini.google.com/')">🚀 注入 Gemini</button>
                        <button type="button" class="copy-btn ai-btn" onclick="copyAndJump(this, 'https://chatgpt.com/')">🚀 注入 ChatGPT</button>
                        <button type="button" class="copy-btn" onclick="copyOnly(this)">📋 僅複製源代碼</button>
                    </div>
                </div>`;

            } catch (err) {
                clearInterval(scrambleInterval); container.classList.remove('glitch-pixel-active'); 
                out.innerHTML = `<div style="color:red; font-family:monospace; text-align:center;">SYSTEM ERROR:<br>${err.message}</div>`;
            } finally {
                setTimeout(() => { isCoolingDown = false; btn.innerText = "重新編譯 (Re-Generate)"; btn.disabled = false; }, 3000);
            }
        }
    </script>
</body>
</html>
